<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Virtual Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="keys">
        <div data-key="65" class="key"><kbd>A</kbd><span>Bumbo</span></div>
        <div data-key="83" class="key"><kbd>S</kbd><span>Caixa</span></div>
        <div data-key="68" class="key"><kbd>D</kbd><span>Tom</span></div>
        <div data-key="70" class="key"><kbd>F</kbd><span>Chimbal</span></div>
        <div data-key="71" class="key"><kbd>G</kbd><span>Prato</span></div>
    </div>

    <audio data-key="65" src="https://raw.githubusercontent.com/ArunMichaelTarun/Drum-Kit/master/sounds/kick.wav"></audio>
    <audio data-key="83" src="https://raw.githubusercontent.com/ArunMichaelTarun/Drum-Kit/master/sounds/snare.wav"></audio>
    <audio data-key="68" src="https://raw.githubusercontent.com/ArunMichaelTarun/Drum-Kit/master/sounds/tom.wav"></audio>
    <audio data-key="70" src="https://raw.githubusercontent.com/ArunMichaelTarun/Drum-Kit/master/sounds/tink.wav"></audio>
    <audio data-key="71" src="https://raw.githubusercontent.com/ArunMichaelTarun/Drum-Kit/master/sounds/ride.wav"></audio>

    <script src="script.js"></script>
</body>
</html>
